<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- SEO 및 모바일 웹앱 설정 -->
  <title>영한번역 — 스마트폰용 영어 학습 웹앱</title>
  <meta name="description" content="한 페이지에 한 문장씩, 원어민 발음 듣기와 번역, 상세한 구조 분석 및 필수 암기 단어장으로 영어 회화와 인터뷰를 마스터하는 모바일 학습 앱입니다.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0b08">

  <!-- 스타일시트 링크 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- ── 상단 헤더 바 ── -->
    <header>
      <div class="brand">
        <div class="logo-icon">영</div>
        <h1>영한번역</h1>
      </div>
      <div class="header-controls">
        <div class="select-wrapper">
          <select id="file-select" class="file-select" title="학습할 파일 선택">
            <!-- 자바스크립트에서 동적 로드 -->
          </select>
        </div>
        <button id="settings-btn" class="icon-btn" aria-label="설정 열기">
          ⚙️
        </button>
      </div>
    </header>

    <!-- ── 메인 카드 영역 ── -->
    <main id="card-container">
      <article class="study-card" id="study-card">
        <!-- 자바스크립트(app.js)에서 현재 학습 문장 렌더링 -->
      </article>
    </main>

    <!-- ── 하단 고정 제어 바 ── -->
    <footer>
      <!-- 진행률 표시선 -->
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      
      <!-- 버튼 그룹 -->
      <div class="navigation-controls">
        <button id="prev-btn" class="nav-btn" aria-label="이전 문장">
          ◀ 이전
        </button>
        <button id="bookmark-btn" class="bookmark-btn" aria-label="문장 즐겨찾기">
          ★
        </button>
        <button id="next-btn" class="nav-btn primary" aria-label="다음 문장">
          다음 ▶
        </button>
      </div>
      
      <!-- 진행률 텍스트 표시 -->
      <div id="progress-text" style="font-family: var(--font-mono); font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: -4px;">
        0 / 0 (0%)
      </div>
    </footer>

    <!-- ── 단어 클릭 시 노출되는 사전 검색 미니 팝업 ── -->
    <div id="word-popup" class="word-popup">
      <div class="word-popup-header">
        <span id="popup-word" class="popup-word">word</span>
        <button id="popup-close" class="popup-close" aria-label="팝업 닫기">&times;</button>
      </div>
      <div class="popup-links">
        <a id="dict-naver" href="#" target="_blank" class="dict-btn">
          Naver 사전 🔍
        </a>
        <a id="dict-cambridge" href="#" target="_blank" class="dict-btn">
          Cambridge 🇬🇧
        </a>
      </div>
    </div>

    <!-- ── 어두운 배경 오버레이 (설정 및 팝업용) ── -->
    <div id="dim-overlay" class="dim-overlay"></div>

    <!-- ── 우측 슬라이드-인 설정 패널 ── -->
    <aside id="settings-panel" class="settings-panel">
      <div class="settings-header">
        <h2>앱 및 학습 설정</h2>
        <button id="close-settings-btn" class="icon-btn" aria-label="설정 닫기">&times;</button>
      </div>
      
      <div class="settings-content">
        <!-- 0. 학습 파일 선택 대시보드 -->
        <div class="setting-group">
          <label>학습할 영어 파일 선택</label>
          <div id="file-list-dashboard" class="file-list-dashboard">
            <!-- 자바스크립트에서 터치용 카드 목록 동적 로드 -->
          </div>
        </div>

        <!-- 1. 테마 선택 -->
        <div class="setting-group">
          <label>앱 테마</label>
          <div class="theme-picker">
            <button class="theme-opt" data-theme="dark">Dark</button>
            <button class="theme-opt" data-theme="light">Light</button>
            <button class="theme-opt" data-theme="sepia">Sepia</button>
          </div>
        </div>

        <!-- 2. 글자 크기 조절 -->
        <div class="setting-group">
          <label>글자 크기</label>
          <div class="slider-container">
            <input type="range" id="font-size-slider" class="range-slider" min="0" max="3" step="1" value="1">
            <span id="font-size-val" class="slider-val">보통</span>
          </div>
        </div>

        <!-- 3. 발음 듣기 속도 -->
        <div class="setting-group">
          <label>영어 듣기 재생 배속</label>
          <div class="slider-container">
            <input type="range" id="tts-speed-slider" class="range-slider" min="0.5" max="2.0" step="0.25" value="1.0">
            <span id="tts-speed-val" class="slider-val">1.00x</span>
          </div>
        </div>

        <!-- 4. 발음 목소리 선택 -->
        <div class="setting-group">
          <label>영어 발음 억양/목소리</label>
          <select id="voice-select" class="settings-select" title="TTS 발음 선택">
            <!-- 자바스크립트에서 영어 권역 발음 자동 색출 -->
          </select>
        </div>

        <!-- 5. 자동 발음 설정 -->
        <div class="setting-group">
          <div class="setting-row">
            <span>새 문장 진입 시 영어 자동 재생</span>
            <label class="switch">
              <input type="checkbox" id="autoplay-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- ── 영어 학습 문장 파일 입력 및 임포트 ── -->
        <div class="setting-group" style="margin-top: 10px; padding-top: 20px; border-top: 1px solid var(--border-color);">
          <label>학습용 새 영어 파일 가져오기</label>
          <div class="file-manager-box">
            <!-- 방법 A: 파일 탐색기 업로드 -->
            <label for="file-upload" class="file-input-label">
              📁 HTML / JSON / TXT 파일 가져오기
              <input type="file" id="file-upload" accept=".html,.htm,.json,.txt">
            </label>
            
            <div style="font-size: 11px; color: var(--text-muted); text-align: center; margin: -4px 0 4px;">
              * elon_sunak_interview.html 형식 파일이나 JSON 파일을 그대로 넣을 수 있습니다.
            </div>

            <!-- 방법 B: 직접 복사 붙여넣기 -->
            <textarea id="text-paste" class="text-paste-area" placeholder="[형식 예시: 영어 문장 | 한국어 번역 | 단어=뜻;단어2=뜻]&#10;여기에 텍스트를 붙여넣어 카드를 바로 추가해 보세요."></textarea>
            <button id="text-submit-btn" class="submit-btn">나만의 카드 만들기</button>
          </div>
        </div>

        <!-- 푸터 안내 -->
        <div class="settings-footer-note">
          영한번역 v1.1.0 · Smartphone English Study PWA<br>
          * Space바(번역보기) / 방향키(이동) / Enter(발음) 단축키 지원
        </div>
      </div>
    </aside>

  </div>

  <!-- 자바스크립트 로딩 -->
  <script src="default_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
